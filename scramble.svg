<div class="scramble-container">
  <span class="scramble-text" data-text="Hello, World!">Welcome</span>
</div>

<style>
  .scramble-container {
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Courier New', Courier, monospace;
    font-size: 2rem;
    font-weight: bold;
    background-color: #0d1117;
    color: #58a6ff;
    padding: 20px;
    border-radius: 8px;
  }

  .scramble-text {
    position: relative;
    display: inline-block;
  }

  .scramble-text::before {
    content: attr(data-text);
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #0d1117;
    clip-path: polygon(0 0, 100% 0, 100% 0, 0 0);
    animation: scrambleGlitch 2.5s ease-in-out infinite;
    color: #ff7b72;
  }

  @keyframes scrambleGlitch {
    0% {
      content: "█▒░▓█";
      clip-path: polygon(0 0, 100% 0, 100% 10%, 0 10%);
      transform: translate(-2px, 2px);
    }
    10% {
      content: "▓▒ █▒";
      clip-path: polygon(0 20%, 100% 20%, 100% 35%, 0 35%);
      transform: translate(2px, -1px);
    }
    20% {
      content: "░▒▓ ▒";
      clip-path: polygon(0 40%, 100% 40%, 100% 55%, 0 55%);
      transform: translate(-1px, -2px);
    }
    30% {
      content: "█▓ ▒░";
      clip-path: polygon(0 65%, 100% 65%, 100% 80%, 0 80%);
      transform: translate(2px, 1px);
    }
    40% {
      content: "▒▓█ ▒";
      clip-path: polygon(0 85%, 100% 85%, 100% 100%, 0 100%);
      transform: translate(-2px, -1px);
    }
    50%, 100% {
      content: attr(data-text);
      clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
      transform: translate(0, 0);
    }
  }
</style>

