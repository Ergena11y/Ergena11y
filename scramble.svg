<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ergen's Profile</title>
  <style>
    body {
      background: #0d1117;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Courier New', monospace;
    }

    .profile {
      text-align: left;
    }

    .name {
      font-size: 28px;
      font-weight: bold;
      color: #ffffff;
      margin-bottom: 10px;
      text-transform: capitalize;
    }

    .title {
      font-size: 20px;
      color: #8b949e;
      height: 28px;
      overflow: hidden;
    }

    /* Анимация scramble */
    @keyframes scramble {
      0% {
        content: "J_n!or B@cknd D*v | B#shk_k";
      }
      25% {
        content: "Jun9or Ba1knd Dev | Bi5hkek";
      }
      50% {
        content: "Junio# B@ckend De# | Bishke#";
      }
      75% {
        content: "Junior Backend Developer · Bishke";
      }
      100% {
        content: "Junior Backend Developer · Bishkek, Kyrgyzstan";
      }
    }

    .scramble {
      animation: scramble 3s steps(10, end) 1;
    }

    .scramble::after {
      content: "Junior Backend Developer · Bishkek, Kyrgyzstan";
      animation: scramble 3s steps(10, end) infinite;
    }

    .stack {
      font-size: 16px;
      color: #8b949e;
      margin-top: 30px;
    }

    .status {
      font-size: 16px;
      color: #238636;
      margin-top: 20px;
    }

    .cursor {
      display: inline-block;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="profile">
    <div class="name">ergen alymbekov</div>
    <div class="title">
      <span class="scramble"></span><span class="cursor">_</span>
    </div>
    <div class="stack">Java · Spring Boot · NestJS · TypeScript</div>
    <div class="status">building things quietly · open to work</div>
  </div>
</body>
</html>
