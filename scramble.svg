<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 150">
  <defs>
    <style>
      .profile-text {
        font-family: 'Courier New', Courier, monospace;
        font-weight: bold;
        fill: #ffffff; 
      }
      .name { font-size: 28px; text-transform: capitalize; }
      .title { font-size: 20px; fill: #8b949e; } 
      .status { font-size: 16px; fill: #238636; } 

      @keyframes blink { 50% { opacity: 0; } }
      .cursor { animation: blink 0.8s infinite; }
    </style>
  </defs>

  <!-- Имя -->
  <text x="20" y="40" class="profile-text name">ergen alymbekov</text>
  
  <!-- Текст с анимацией -->
  <text x="20" y="75" class="profile-text title">
    <tspan>Junior Backend Developer · Bishkek, Kyrgyzstan</tspan>
  </text>
  <text x="590" y="75" class="profile-text title cursor">_</text>

  <!-- Стек и статус -->
  <text x="20" y="105" class="profile-text title" style="font-size: 16px;">Java · Spring Boot · NestJS · TypeScript</text>
  <text x="20" y="125" class="profile-text status">building things quietly · open to work</text>
</svg>
